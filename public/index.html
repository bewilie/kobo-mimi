<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kobo Mimi - Bibliothèque</title>
  <meta name="description" content="Votre bibliothèque d'e-books personnelle pour liseuse Kobo. Téléchargez et gérez vos EPUBs facilement.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    /* 
      Utilisation de valeurs statiques à la place des variables CSS 
      pour assurer une compatibilité totale avec le navigateur WebKit de la Kobo Clara.
    */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #0b0f19;
      color: #f3f4f6;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 20px 15px;
    }

    header {
      max-width: 1000px;
      width: 100%;
      margin: 0 auto 25px auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      padding-bottom: 15px;
    }

    h1 {
      font-family: 'Instrument Serif', serif;
      font-size: 2.5rem;
      font-weight: 400;
      letter-spacing: -0.02em;
    }

    .header-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .btn {
      padding: 8px 16px;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: 0.9rem;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.03);
      color: #f3f4f6;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
    }

    .btn:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .btn-primary {
      background: #3b82f6;
      color: white;
      border: none;
    }

    .btn-primary:hover {
      background: #2563eb;
    }

    .btn-danger {
      color: #ef4444;
      border-color: rgba(239, 68, 68, 0.2);
    }

    .btn-danger:hover {
      background: rgba(239, 68, 68, 0.1);
      border-color: #ef4444;
    }

    main {
      max-width: 1000px;
      width: 100%;
      margin: 0 auto;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* Upload zone */
    .upload-zone {
      display: none;
      border: 2px dashed rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 30px;
      text-align: center;
      background: rgba(255, 255, 255, 0.03);
      cursor: pointer;
      position: relative;
    }

    .upload-zone:hover, .upload-zone.dragover {
      border-color: #3b82f6;
      background: rgba(59, 130, 246, 0.04);
    }

    .upload-zone input[type="file"] {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
    }

    .upload-icon {
      font-size: 2rem;
      margin-bottom: 10px;
      color: #9ca3af;
    }

    /* Grid layout */
    .books-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
    }

    .card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 20px;
      flex: 1 1 280px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 15px;
      min-width: 250px;
    }

    .card-info {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .book-icon {
      font-size: 2rem;
    }

    .card-details {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }

    .book-title {
      font-weight: 500;
      font-size: 1.1rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #f3f4f6;
    }

    .book-meta {
      font-size: 0.8rem;
      color: #9ca3af;
    }

    .card-actions {
      display: flex;
      gap: 8px;
    }

    .card-actions .btn {
      flex: 1;
      justify-content: center;
    }

    .empty-state {
      text-align: center;
      padding: 50px 20px;
      color: #9ca3af;
      border: 1px dashed rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      width: 100%;
    }

    /* Toast notification */
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #10b981;
      color: white;
      padding: 12px 24px;
      border-radius: 8px;
      opacity: 0;
      transition: opacity 0.2s ease-in-out;
      z-index: 1000;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
    }

    .toast.error {
      background: #ef4444;
    }
  </style>
</head>
<body>

  <header>
    <h1>kobo-mimi</h1>
    <div class="header-actions">
      <button class="btn btn-primary" onclick="toggleUploadZone()">➕ Ajouter un livre</button>
    </div>
  </header>

  <main>
    <div class="upload-zone" id="dropzone">
      <div class="upload-icon">📖</div>
      <p>Glissez-déposez des fichiers <strong>.epub</strong> ici ou cliquez pour parcourir</p>
      <input type="file" id="fileInput" accept=".epub" onchange="handleFileSelect(event)">
    </div>

    <div class="books-grid" id="booksGrid">
      <div style="text-align: center; padding: 20px; width: 100%;">Chargement des livres...</div>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    /*
      Script réécrit en ES5 (Vanilla JS sans async/await, sans variables let/const, 
      sans fonctions fléchées, sans template literals et avec XMLHttpRequest) 
      pour assurer un support à 100% sur le vieux navigateur de la Kobo Clara.
    */
    var books = [];
    var dropzone = document.getElementById('dropzone');
    var booksGrid = document.getElementById('booksGrid');
    var toast = document.getElementById('toast');

    // Drag and drop events (for desktop)
    if (dropzone) {
      dropzone.addEventListener('dragenter', preventDefault, false);
      dropzone.addEventListener('dragover', preventDefault, false);
      dropzone.addEventListener('dragleave', preventDefault, false);
      dropzone.addEventListener('drop', preventDefault, false);

      dropzone.addEventListener('dragenter', function() { dropzone.className = 'upload-zone dragover'; }, false);
      dropzone.addEventListener('dragover', function() { dropzone.className = 'upload-zone dragover'; }, false);
      dropzone.addEventListener('dragleave', function() { dropzone.className = 'upload-zone'; }, false);
      dropzone.addEventListener('drop', function(e) {
        dropzone.className = 'upload-zone';
        var dt = e.dataTransfer;
        var files = dt.files;
        if (files.length > 0) {
          uploadFile(files[0]);
        }
      }, false);
    }

    function preventDefault(e) {
      e.preventDefault();
    }

    function showToast(message, isError) {
      toast.innerHTML = message;
      toast.className = 'toast ' + (isError ? 'error' : '') + ' show';
      setTimeout(function() {
        toast.className = 'toast';
      }, 3000);
    }

    function toggleUploadZone() {
      var zone = document.getElementById('dropzone');
      if (zone.style.display === 'none' || !zone.style.display) {
        zone.style.display = 'block';
      } else {
        zone.style.display = 'none';
      }
    }

    function loadBooks() {
      booksGrid.innerHTML = '<div style="text-align: center; padding: 20px; width: 100%;">Chargement des livres...</div>';
      
      var xhr = new XMLHttpRequest();
      xhr.open('GET', '/api/list', true);
      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
          if (xhr.status === 200) {
            try {
              books = JSON.parse(xhr.responseText);
              renderBooks();
            } catch (e) {
              showToast('Erreur de lecture des données', true);
              booksGrid.innerHTML = '<div style="text-align: center; padding: 20px; width: 100%; color: #ef4444;">Erreur de lecture de la liste.</div>';
            }
          } else {
            showToast('Erreur lors du chargement des livres', true);
            booksGrid.innerHTML = '<div style="text-align: center; padding: 20px; width: 100%; color: #ef4444;">Erreur de chargement. Veuillez vérifier la base Blob.</div>';
          }
        }
      };
      xhr.send();
    }

    function formatBytes(bytes) {
      if (!bytes) return '0 Ko';
      var k = 1024;
      var sizes = ['Octets', 'Ko', 'Mo', 'Go'];
      var i = Math.floor(Math.log(bytes) / Math.log(k));
      if (i < 0) i = 0;
      return (bytes / Math.pow(k, i)).toFixed(1) + ' ' + sizes[i];
    }

    function renderBooks() {
      if (books.length === 0) {
        booksGrid.innerHTML = '<div class="empty-state"><p>Aucun e-book disponible dans votre bibliothèque.</p></div>';
        return;
      }

      var html = '';
      for (var i = 0; i < books.length; i++) {
        var book = books[i];
        // Nettoie le nom de fichier
        var cleanName = book.pathname
          .replace(/\.[^/.]+$/, "")
          .replace(/[-_]/g, " ");

        html += '<div class="card">' +
                  '<div class="card-info">' +
                    '<span class="book-icon">📘</span>' +
                    '<div class="card-details">' +
                      '<div class="book-title">' + cleanName + '</div>' +
                      '<div class="book-meta">' + formatBytes(book.size) + '</div>' +
                    '</div>' +
                  '</div>' +
                  '<div class="card-actions">' +
                    '<a href="' + book.url + '" download="' + book.pathname + '" class="btn btn-primary">Télécharger</a>' +
                    '<button class="btn btn-danger" onclick="deleteBook(\'' + book.url + '\')">🗑️</button>' +
                  '</div>' +
                '</div>';
      }
      booksGrid.innerHTML = html;
    }

    function handleFileSelect(event) {
      var files = event.target.files;
      if (files.length > 0) {
        uploadFile(files[0]);
      }
    }

    function uploadFile(file) {
      if (file.name.indexOf('.epub') === -1) {
        showToast('Veuillez sélectionner un fichier .epub uniquement.', true);
        return;
      }

      showToast('Téléversement de ' + file.name + '...');

      var xhr = new XMLHttpRequest();
      xhr.open('POST', '/api/upload?filename=' + encodeURIComponent(file.name), true);
      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
          if (xhr.status === 200) {
            showToast('Téléversement réussi !');
            loadBooks();
          } else {
            var errMsg = 'Erreur serveur';
            try {
              var res = JSON.parse(xhr.responseText);
              errMsg = res.error || errMsg;
            } catch(e) {}
            showToast(errMsg, true);
          }
        }
      };
      xhr.send(file);
    }

    function deleteBook(url) {
      if (!confirm('Voulez-vous vraiment supprimer cet e-book ?')) return;

      var xhr = new XMLHttpRequest();
      xhr.open('POST', '/api/delete?url=' + encodeURIComponent(url), true);
      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
          if (xhr.status === 200) {
            showToast('Livre supprimé avec succès.');
            loadBooks();
          } else {
            showToast('Erreur de suppression.', true);
          }
        }
      };
      xhr.send();
    }

    // Premier chargement
    loadBooks();
  </script>
</body>
</html>
